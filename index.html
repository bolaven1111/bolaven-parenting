<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>布拉万育儿大师</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@600&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }

body {
  font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: oklch(0.985 0.004 85);
  color: oklch(0.15 0.015 85);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ===== Layout ===== */
.container {
  width: 100%;
  max-width: 640px;
  margin: 0 auto;
  padding: 0 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ===== Header with Logo ===== */
header {
  padding: 36px 0 28px;
  text-align: center;
  position: relative;
}

.logo-area {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 4px;
}

.logo-wrapper {
  flex-shrink: 0;
  width: 56px;
  height: 56px;
}

.logo-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.title-group {
  text-align: left;
}

h1 {
  font-family: 'Noto Serif SC', 'Noto Sans SC', serif;
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 600;
  letter-spacing: 0.06em;
  color: oklch(0.18 0.02 85);
  text-wrap: balance;
  line-height: 1.3;
}

.subtitle {
  font-family: 'Caveat', cursive;
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 600;
  color: oklch(0.4 0.06 210);
  letter-spacing: 0.04em;
  margin-top: 2px;
  line-height: 1.2;
}

.header-divider {
  width: 48px;
  height: 3px;
  background: oklch(0.55 0.12 190);
  border-radius: 2px;
  margin: 14px auto 0;
}

/* ===== Book Selector ===== */
.book-selector {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 16px;
  margin-top: 4px;
}

.book-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border: 2px solid oklch(0.88 0.01 85);
  border-radius: 12px;
  background: oklch(0.97 0.006 85);
  color: oklch(0.5 0.03 85);
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  line-height: 1.3;
}

.book-btn:hover {
  border-color: oklch(0.75 0.08 210);
  background: oklch(0.94 0.03 210 / 0.2);
}

.book-btn.active {
  border-color: oklch(0.5 0.15 210);
  background: oklch(0.9 0.06 210 / 0.25);
  color: oklch(0.3 0.12 210);
  box-shadow: 0 0 0 3px oklch(0.85 0.06 210 / 0.2);
}

.book-btn .book-icon {
  font-size: 1.1rem;
}

.book-btn .check-mark {
  display: none;
  font-size: 0.8rem;
}

.book-btn.active .check-mark {
  display: inline;
}

/* ===== Search Area ===== */
.search-section {
  padding-bottom: 24px;
}

.search-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  background: oklch(0.97 0.006 85);
  border: 1.5px solid oklch(0.88 0.01 85);
  border-radius: 14px;
  transition: all 0.2s ease;
}

.search-wrapper:focus-within {
  border-color: oklch(0.5 0.15 210);
  box-shadow: 0 0 0 3px oklch(0.85 0.06 210 / 0.3);
  background: oklch(1 0 0);
}

.search-icon {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  margin-left: 16px;
  color: oklch(0.6 0.03 85);
  transition: color 0.2s;
}

.search-wrapper:focus-within .search-icon {
  color: oklch(0.5 0.15 210);
}

#searchInput {
  flex: 1;
  border: none;
  background: transparent;
  padding: 14px 12px;
  font-size: 1rem;
  font-family: inherit;
  color: oklch(0.15 0.015 85);
  outline: none;
  min-height: 48px;
}

#searchInput::placeholder {
  color: oklch(0.6 0.03 85);
  font-weight: 300;
}

#searchBtn {
  flex-shrink: 0;
  margin-right: 6px;
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 10px;
  background: oklch(0.5 0.15 210);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.15s;
}

#searchBtn:hover { background: oklch(0.45 0.15 210); }
#searchBtn:active { transform: scale(0.95); }

#searchBtn svg {
  width: 18px;
  height: 18px;
}

/* ===== Examples ===== */
.examples {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 14px;
  justify-content: center;
}

.example-chip {
  display: inline-block;
  padding: 6px 14px;
  font-size: 0.8rem;
  color: oklch(0.5 0.12 210);
  background: oklch(0.92 0.04 210 / 0.25);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  font-family: inherit;
  line-height: 1.4;
}

.example-chip:hover {
  background: oklch(0.88 0.06 210 / 0.4);
  transform: translateY(-1px);
}

.example-chip:active {
  transform: translateY(0);
}

/* ===== Results ===== */
.results-section {
  flex: 1;
  padding-bottom: 32px;
}

/* Loading */
.loading {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 20px 0;
  color: oklch(0.5 0.03 85);
  font-size: 0.9rem;
}

.loading.active {
  display: flex;
}

.loading-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: oklch(0.5 0.15 210);
  animation: dotPulse 1.4s ease-in-out infinite both;
}

.loading-dot:nth-child(1) { animation-delay: 0s; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPulse {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

@media (prefers-reduced-motion: reduce) {
  .loading-dot { animation: none; opacity: 0.6; }
}

/* Answer Card */
.answer-card {
  display: none;
  animation: fadeIn 0.3s ease;
}

.answer-card.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .answer-card.active { animation: none; }
}

.answer-content {
  background: oklch(0.97 0.006 85);
  border: 1px solid oklch(0.9 0.01 85);
  border-radius: 14px;
  padding: 24px;
  line-height: 1.8;
  font-size: 0.95rem;
}

.answer-content p {
  margin-bottom: 12px;
}

.answer-content p:last-child {
  margin-bottom: 0;
}

.answer-content strong {
  font-weight: 600;
  color: oklch(0.15 0.02 85);
}

.answer-content u {
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 2px;
  text-decoration-color: oklch(0.6 0.12 210 / 0.5);
}

.answer-content em {
  font-style: normal;
  background: oklch(0.92 0.05 60 / 0.3);
  padding: 0 4px;
  border-radius: 3px;
}

.answer-source {
  margin-top: 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.source-badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  font-size: 0.75rem;
  color: oklch(0.45 0.08 160);
  background: oklch(0.9 0.04 160 / 0.2);
  border-radius: 6px;
  font-weight: 400;
  letter-spacing: 0.02em;
}

/* Error */
.error-msg {
  display: none;
  padding: 16px 20px;
  background: oklch(0.95 0.05 30 / 0.2);
  border: 1px solid oklch(0.85 0.08 30 / 0.3);
  border-radius: 12px;
  color: oklch(0.4 0.08 30);
  font-size: 0.9rem;
  line-height: 1.6;
}

.error-msg.active {
  display: block;
  animation: fadeIn 0.3s ease;
}

/* ===== Footer ===== */
footer {
  text-align: center;
  padding: 20px 0 32px;
  font-size: 0.75rem;
  color: oklch(0.65 0.02 85);
  border-top: 1px solid oklch(0.92 0.005 85);
  margin-top: auto;
}

/* ===== Responsive ===== */
@media (max-width: 500px) {
  header { padding: 28px 0 22px; }
  
  .logo-wrapper {
    width: 44px;
    height: 44px;
  }
  
  .logo-area {
    gap: 12px;
  }
  
  .book-btn {
    padding: 8px 14px;
    font-size: 0.82rem;
  }
  
  .book-selector {
    gap: 8px;
  }
  
  .answer-content { padding: 18px; }
  .container { padding: 0 16px; }
}

@media (max-width: 400px) {
  .logo-wrapper {
    width: 38px;
    height: 38px;
  }
  
  .logo-area {
    gap: 10px;
  }
}

/* ===== Stats page (hidden) ===== */
.stats-page { display: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-area">
      <div class="logo-wrapper">
        <img src="/logo.jpg" alt="布拉万育儿大师" width="56" height="56">
      </div>
      <div class="title-group">
        <h1>布拉万育儿大师</h1>
        <p class="subtitle">Bolaven-Parenting Master</p>
      </div>
    </div>
    <div class="header-divider"></div>
  </header>

  <section class="search-section">
    <!-- 双书选择 -->
    <div class="book-selector" id="bookSelector">
      <button class="book-btn active" data-book="all">
        <span class="book-icon">📚</span>
        <span>全部书籍</span>
        <span class="check-mark"> ✓</span>
      </button>
      <button class="book-btn" data-book="美国儿科学会育儿百科">
        <span class="book-icon">👶</span>
        <span>美国儿科学会</span>
        <span class="check-mark"> ✓</span>
      </button>
      <button class="book-btn" data-book="崔玉涛育儿百科">
        <span class="book-icon">🍼</span>
        <span>崔玉涛育儿百科</span>
        <span class="check-mark"> ✓</span>
      </button>
    </div>

    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="searchInput" type="text" placeholder="比如：宝宝发烧怎么办？" autocomplete="off" enterkeyhint="search">
      <button id="searchBtn" aria-label="搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

    <div class="examples">
      <button class="example-chip" data-query="宝宝发烧多少度算发烧">宝宝发烧多少度算发烧？</button>
      <button class="example-chip" data-query="新生儿脐带怎么护理">新生儿脐带怎么护理？</button>
      <button class="example-chip" data-query="宝宝湿疹怎么办">宝宝湿疹怎么办？</button>
      <button class="example-chip" data-query="婴儿睡眠时间多长正常">一天睡多久正常？</button>
    </div>
  </section>

  <section class="results-section">
    <div class="loading" id="loading">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <span style="margin-left:4px;">正在查阅资料…</span>
    </div>

    <div class="answer-card" id="answerCard">
      <div class="answer-content" id="answerContent"></div>
      <div class="answer-source" id="answerSource"></div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </section>

  <footer>
    数据来源：《美国儿科学会育儿百科》·《崔玉涛育儿百科》
  </footer>
</div>

<script>
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const loading = document.getElementById('loading');
const answerCard = document.getElementById('answerCard');
const answerContent = document.getElementById('answerContent');
const answerSource = document.getElementById('answerSource');
const errorMsg = document.getElementById('errorMsg');
const bookBtns = document.querySelectorAll('.book-btn');

// Current selected book
let selectedBook = 'all';

// Book selection logic
bookBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    bookBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedBook = btn.dataset.book;
  });
});

function doSearch(query) {
  if (!query || !query.trim()) return;
  
  // Reset
  answerCard.classList.remove('active');
  errorMsg.classList.remove('active');
  loading.classList.add('active');
  
  const q = query.trim();

  fetch('/api/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ 
      question: q,
      book: selectedBook
    })
  })
  .then(res => {
    if (!res.ok) {
      return res.json().then(d => { throw new Error(d.error || '请求失败'); });
    }
    return res.json();
  })
  .then(data => {
    loading.classList.remove('active');
    
    if (data.error) {
      errorMsg.textContent = data.error;
      errorMsg.classList.add('active');
      return;
    }

    // Format answer: bold, underline, highlight
    let html = data.answer
      // Escape HTML
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      // Bold+underline
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><u>$1</u></strong>')
      // Bold
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // Underline
      .replace(/__(.+?)__/g, '<u>$1</u>')
      // Paragraphs
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
    html = '<p>' + html + '</p>';
    
    answerContent.innerHTML = html;

    // Sources
    let sourcesHtml = '';
    if (data.sources && data.sources.length > 0) {
      data.sources.forEach(s => {
        sourcesHtml += '<span class="source-badge">📖 ' + s + '</span>';
      });
    }
    answerSource.innerHTML = sourcesHtml;
    answerCard.classList.add('active');

    // Scroll to answer on mobile
    if (window.innerWidth < 640) {
      answerCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  })
  .catch(err => {
    loading.classList.remove('active');
    errorMsg.textContent = '出错了：' + err.message + '。请稍后再试。';
    errorMsg.classList.add('active');
  });
}

searchBtn.addEventListener('click', () => doSearch(searchInput.value));

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    doSearch(searchInput.value);
  }
});

// Example chips
document.querySelectorAll('.example-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const q = chip.dataset.query;
    searchInput.value = q;
    doSearch(q);
  });
});

// Auto-focus on desktop
if (!('ontouchstart' in window)) {
  searchInput.focus();
}
</script>
</body>
</html>
